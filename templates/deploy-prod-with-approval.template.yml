# Template deploy-prod workflow con manual approval gate (GitHub Free
# replacement para "Environment required reviewers" feature de Team plan).
#
# Copy a: <repo>/.github/workflows/deploy-prod.yml
#
# Comportamiento:
#   - Trigger: workflow_dispatch ONLY (nunca push automatico).
#   - Step "Manual approval gate" pausa el run, crea un issue, espera
#     a que un approver listado comente "approved" / "approve" / "lgtm"
#     en el issue.
#   - Sin aprobacion (timeout 24h o "denied" comment) el workflow falla
#     y el deploy nunca corre.
#   - Con aprobacion, el job "deploy" continua usando el reusable
#     deploy-microservice.yml (o equivalente) con env=prod.
#
# Pre-requisitos:
#   - Repo en allowlist prod del binding workloadIdentityUser (S08).
#   - Secret org PAT_FOR_DISPATCH si se necesita cross-repo (no aplica
#     aqui — el dispatch lo hace el operador manual).
#   - FREEZE PROD lifted (S12 o post-).
#
# IMPORTANTE: este workflow NO existe en repos beta todavia. Copy y
# habilitar UNICAMENTE cuando S12 levante el FREEZE PROD.

name: Deploy Prod (manual approval)

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: "SHA validado en beta a promover (corto, 7 chars)"
        required: true
        type: string
      reason:
        description: "Razon del deploy prod (audit trail)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

# Concurrency lock global del repo para prod - solo un deploy prod a
# la vez en este repo.
concurrency:
  group: deploy-prod-${{ github.repository }}
  cancel-in-progress: false

jobs:
  await-approval:
    name: Manual approval gate
    runs-on: ubuntu-latest
    timeout-minutes: 1440   # 24h max para aprobar
    steps:
      - name: Pause for manual approval
        uses: trstringer/manual-approval@74d99dff7380e3e4b122d4ededcbca2b6ce59367 # v1
        with:
          secret: ${{ github.TOKEN }}
          # Lista de GH usernames autorizados para aprobar prod deploys.
          # Editar segun governance del equipo. Minimo 2 owners
          # recomendado para evitar single-point-of-approval.
          approvers: adriangonzalez-lgtm
          minimum-approvals: 1
          issue-title: "Deploy PROD — ${{ github.repository }} sha=${{ inputs.git_sha }}"
          issue-body: |
            ## Solicitud de deploy a PRODUCCION

            **Repo:** ${{ github.repository }}
            **Git SHA:** `${{ inputs.git_sha }}`
            **Razon:** ${{ inputs.reason }}
            **Triggered by:** @${{ github.actor }}
            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Para aprobar
            Comenta en este issue una de las palabras:
            `approved`, `approve`, `lgtm`, `yes`

            ### Para rechazar
            Comenta:
            `denied`, `deny`, `no`

            ### Pre-deploy checklist (verifica antes de aprobar)
            - [ ] Beta deploy del mismo SHA pasó smoke
            - [ ] Imagen `sha-${{ inputs.git_sha }}` existe en AR de prod
            - [ ] Cambios no requieren migration destructiva
            - [ ] Comunicado a equipo (Slack/email)
          issue-timeout-minutes: 1440

  deploy:
    name: Deploy to PROD
    needs: await-approval
    # CRITICAL: este job hereda los inputs del workflow_dispatch trigger
    # y los pasa al reusable. El SA gh-actions-prod tiene los 9 roles
    # production-grade aplicados por S08.
    uses: Viverent/vr-devops/.github/workflows/deploy-microservice.yml@main
    with:
      service_name: ms-EXAMPLE-api    # AJUSTAR per repo
      image_name: example              # AJUSTAR per repo
      env: prod
      migrate_mode: always             # PROD requiere migrate explicito
    secrets: inherit
