# Template workflow para auto-merge de Dependabot patches en GitHub Free.
# Reemplaza el feature 'Dependabot auto-merge' (no disponible en Free).
#
# Copy a: <repo>/.github/workflows/dependabot-auto-merge.yml
#
# Comportamiento Free-compatible:
#   - Patch updates (X.Y.Z+1) -> wait for ALL CI checks green, then
#     immediate squash merge (NO --auto flag, que requiere feature
#     auto-merge no disponible en Free private repos).
#   - Minor updates (X.Y+1.0) -> manual review (no merge).
#   - Major updates (X+1.0.0) -> manual review (no merge).
#
# Pre-requisitos repo:
#   1. Settings -> Actions -> General -> Workflow permissions ->
#      'Allow GitHub Actions to create and approve pull requests' enabled
#      (CRITICO; sin esto secrets.GITHUB_TOKEN queda read-only en runs
#      disparados por dependabot[bot]).
#
# Limitaciones Free vs Team:
#   - Free: este workflow polea checks via 'gh pr checks --watch'.
#     Si los checks pasan, mergea inmediatamente.
#   - Team: en Team se puede usar 'gh pr merge --auto' que respeta
#     branch protection required checks. Migracion zero-effort: solo
#     cambiar la linea --squash a --auto --squash cuando upgradees.

name: Dependabot auto-merge
on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge-patch:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30   # max wait for CI checks
    steps:
      - name: Get Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2

      # Solo proceder con patches. Minor/major caen al step de comment.
      - name: Wait for CI + immediate squash merge (patches only)
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          # gh pr checks --watch hace polling hasta que todos los checks
          # completen. --fail-fast aborta si cualquiera falla.
          # Sin --required (no disponible Free) consideramos TODOS los
          # checks. Workflow timeout-minutes:30 es el techo absoluto.
          gh pr checks "$PR_URL" --watch --fail-fast
          # Si llegamos aqui, todos los checks pasaron. Squash + merge.
          gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on minor/major (no auto-merge)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "Manual review required: \
          ${{ steps.meta.outputs.update-type }} update detected for \
          ${{ steps.meta.outputs.dependency-names }}. Auto-merge solo \
          aplica a patch updates."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
