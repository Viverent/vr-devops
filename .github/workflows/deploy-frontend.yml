name: Deploy Frontend Firebase Hosting (Reusable)

on:
  workflow_call:
    inputs:
      hosting_target:
        description: "Firebase Hosting target name (ej. auth-beta, backoffice-beta, investor-beta, auth-dev)."
        required: true
        type: string
      env:
        description: "Environment target: dev | beta | prod."
        required: true
        type: string
      working_directory:
        description: "Subdirectorio donde vive package.json (Vite root). Default '.'."
        required: false
        type: string
        default: "."
      node_version:
        description: "Version Node para el runner."
        required: false
        type: string
        default: "20"
      smoke_url:
        description: "URL canonica para smoke HEAD post-deploy. Si vacio, se omite smoke."
        required: false
        type: string
        default: ""
      smoke_timeout_seconds:
        description: "Tiempo de gracia para smoke HEAD."
        required: false
        type: number
        default: 60

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend-${{ inputs.hosting_target }}-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve env config
        id: cfg
        working-directory: .
        run: |
          set -euo pipefail
          ENV_TARGET="${{ inputs.env }}"

          if [ "$ENV_TARGET" = "prod" ]; then
            PROJECT_ID="vr-portal-fb"
            POOL_PROJ_NUM="126856503055"
            SA_EMAIL="gh-actions-prod@vr-portal-fb.iam.gserviceaccount.com"
          elif [ "$ENV_TARGET" = "beta" ]; then
            PROJECT_ID="vr-portal-fb-beta"
            POOL_PROJ_NUM="214382208885"
            SA_EMAIL="gh-actions-beta@vr-portal-fb-beta.iam.gserviceaccount.com"
          elif [ "$ENV_TARGET" = "dev" ]; then
            PROJECT_ID="vr-portal-fb-dev"
            POOL_PROJ_NUM="248808470845"
            SA_EMAIL="gh-actions-dev@vr-portal-fb-dev.iam.gserviceaccount.com"
          else
            echo "::error::Unsupported env: $ENV_TARGET (only dev|beta|prod)"
            exit 1
          fi

          GIT_SHA=$(git rev-parse --short=7 HEAD)

          {
            echo "project_id=$PROJECT_ID"
            echo "pool_project_number=$POOL_PROJ_NUM"
            echo "service_account=$SA_EMAIL"
            echo "git_sha=$GIT_SHA"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved frontend deploy config:"
          echo "  env=$ENV_TARGET"
          echo "  hosting_target=${{ inputs.hosting_target }}"
          echo "  project=$PROJECT_ID"
          echo "  working_directory=${{ inputs.working_directory }}"
          echo "  git_sha=$GIT_SHA"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: projects/${{ steps.cfg.outputs.pool_project_number }}/locations/global/workloadIdentityPools/github-pool/providers/github-actions
          service_account: ${{ steps.cfg.outputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ steps.cfg.outputs.project_id }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate env file
        run: |
          set -euo pipefail
          if [ ! -f ".env.${{ inputs.env }}" ]; then
            echo "::error::.env.${{ inputs.env }} no existe en ${{ inputs.working_directory }}"
            exit 1
          fi
          echo "::notice::Found .env.${{ inputs.env }}"

      - name: Build frontend (vite mode=${{ inputs.env }})
        run: npm run build -- --mode ${{ inputs.env }}

      - name: Install firebase-tools
        working-directory: .
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        id: deploy
        run: |
          set -euo pipefail
          firebase deploy \
            --only hosting:${{ inputs.hosting_target }} \
            --project ${{ steps.cfg.outputs.project_id }} \
            --non-interactive \
            --force

      - name: Smoke HEAD on hosting URL
        id: smoke
        if: inputs.smoke_url != ''
        working-directory: .
        run: |
          set -euo pipefail
          TARGET="${{ inputs.smoke_url }}"
          MAX_TRIES=$(( ${{ inputs.smoke_timeout_seconds }} / 5 ))
          if [ "$MAX_TRIES" -lt 1 ]; then MAX_TRIES=1; fi

          echo "::notice::Smoke HEAD target: $TARGET (max $MAX_TRIES attempts x 5s)"
          for i in $(seq 1 "$MAX_TRIES"); do
            if curl -fsSL --head --max-time 5 -o /dev/null "$TARGET"; then
              echo "::notice::Smoke OK on attempt $i/$MAX_TRIES"
              exit 0
            fi
            echo "Attempt $i/$MAX_TRIES failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke HEAD failed for $TARGET after ${{ inputs.smoke_timeout_seconds }}s"
          exit 1

      - name: Deploy summary
        if: always()
        working-directory: .
        run: |
          {
            echo "## Deploy Frontend summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Hosting target | ${{ inputs.hosting_target }} |"
            echo "| Env | ${{ inputs.env }} |"
            echo "| Project | ${{ steps.cfg.outputs.project_id }} |"
            echo "| Working dir | ${{ inputs.working_directory }} |"
            echo "| Node version | ${{ inputs.node_version }} |"
            echo "| Git SHA | ${{ steps.cfg.outputs.git_sha }} |"
            echo "| Smoke URL | ${{ inputs.smoke_url || '(none)' }} |"
            echo "| Deploy result | ${{ steps.deploy.conclusion || 'not-run' }} |"
            echo "| Smoke result | ${{ steps.smoke.conclusion || 'not-run' }} |"
            echo "| Job conclusion | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
