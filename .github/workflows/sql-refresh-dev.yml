name: SQL Refresh Dev (schemas prod + data beta)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'YES' to drop dev DB tables and re-apply schemas + data"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  BUCKET: gs://vr-portal-fb-sql-refresh
  IMAGE: us-central1-docker.pkg.dev/vr-portal-fb-dev/services/sql-refresh:v1
  DBS_PROD: catalog_db,collections_db,contracts_db,core_db,finance_db,identity_db,persons_db,rentals_db,sales_db,tickets_db
  DBS_BETA: catalog_db_beta,collections_db_beta,contracts_db_beta,core_db_beta,finance_db_beta,identity_db_beta,persons_db_beta,rentals_db_beta,sales_db_beta,tickets_db_beta
  DBS_DEV: catalog_db_dev,collections_db_dev,contracts_db_dev,core_db_dev,finance_db_dev,identity_db_dev,persons_db_dev,rentals_db_dev,sales_db_dev,tickets_db_dev

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "YES" ]; then
            echo "::error::confirm must be exactly YES"; exit 1
          fi

  export-prod:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: projects/126856503055/locations/global/workloadIdentityPools/github-pool/providers/github-actions
          service_account: gh-actions-prod@vr-portal-fb.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Execute export-prod job
        run: |
          gcloud run jobs execute sql-refresh-export-prod --region=us-central1 --project=vr-portal-fb --wait

  dump-beta:
    needs: export-prod
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: projects/214382208885/locations/global/workloadIdentityPools/github-pool/providers/github-actions
          service_account: gh-actions-beta@vr-portal-fb-beta.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Execute dump-beta job
        run: |
          gcloud run jobs execute sql-refresh-dump-beta --region=us-central1 --project=vr-portal-fb-beta --wait

  apply-dev:
    needs: dump-beta
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: projects/248808470845/locations/global/workloadIdentityPools/github-pool/providers/github-actions
          service_account: gh-actions-dev@vr-portal-fb-dev.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - name: Execute apply-to-dev job
        run: |
          gcloud run jobs execute sql-refresh-apply-dev --region=us-central1 --project=vr-portal-fb-dev --wait
