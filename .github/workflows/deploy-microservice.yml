name: Deploy Microservice (Reusable)

# Reusable workflow para deploy de cualquier ms-*-api a Cloud Run.
#
# Diseno production-grade:
#   - WIF auth via gh-actions-${env} (sin SA JSON keys).
#   - Image naming homologo a build-image.sh (MS_IMAGE_SUFFIX from env).
#   - Step ordering safety-first:
#       1. Build + push image con Docker BuildKit + GHA cache (idempotent:
#          skip si ya esta en AR).
#       2. Render Service + Job YAMLs.
#       3. Migrate job replace + execute (con NUEVA imagen, antes del
#          service deploy). Si migrate falla, service queda intacto.
#       4. Capture revision previa (justo antes de mutar el service).
#       5. Deploy service replace.
#       6. Smoke /health con retry loop.
#       7. Rollback automatico si deploy succeded pero smoke fallo.
#   - Concurrency lock per (service, env) - dos pushes a main no pisan.
#   - Actions pinned a SHA explicito (anti supply-chain), verificadas
#     vivas via `gh api repos/<repo>/git/refs/tags/<tag>`.
#   - Logs verbose con identifiers resueltos para auditoria.
#
# Caller espera (.github/workflows/deploy-beta.yml):
#   uses: Viverent/vr-devops/.github/workflows/deploy-microservice.yml@main
#   with:
#     service_name: ms-sales-api
#     image_name: sales              # slug, sin prefijo "ms-"
#     env: beta
#   secrets: inherit

on:
  workflow_call:
    inputs:
      service_name:
        description: "Cloud Run service base (sin sufijo). Ej: ms-sales-api."
        required: true
        type: string
      image_name:
        description: "Slug del subgrafo (sin prefijo 'ms-'). Ej: sales, tickets, identity."
        required: true
        type: string
      env:
        description: "Environment target (beta solo por ahora; prod queda diferido a S12)."
        required: true
        type: string
      migrate_mode:
        description: "auto (corre si existe job) | always (fail si no existe) | never (skip explicit)."
        required: false
        type: string
        default: "auto"
      smoke_timeout_seconds:
        description: "Tiempo total de gracia para que /health responda 200 post-deploy."
        required: false
        type: number
        default: 60
      migrate_timeout_minutes:
        description: "Timeout total para migrate job execute. Migraciones grandes pueden requerir >10 min."
        required: false
        type: number
        default: 30

permissions:
  id-token: write
  contents: read

# Concurrency lock: dos pushes a main del mismo repo no se pisan en
# Cloud Run replace. cancel-in-progress=false serializa los runs en
# orden de llegada (no descarta uno por el otro).
concurrency:
  group: deploy-${{ inputs.service_name }}-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # ── Setup ────────────────────────────────────────────────────────

      # Step 1: caller repo (Dockerfile + source code).
      - name: Checkout caller repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Step 2: vr-devops (templates + render-cloudrun.sh + env files).
      # ref: main asume que vr-devops branch main tiene HEAD valido en remote.
      - name: Checkout vr-devops
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Viverent/vr-devops
          path: vr-devops
          ref: main

      # Step 3: Resolve env-specific identifiers leyendo el env file
      # de vr-devops (single source of truth con orchestrator).
      # Usamos ENV_TARGET local-only para no colisionar con el `export
      # ENV` que el env file inyecta al sourcear.
      - name: Resolve env config
        id: cfg
        run: |
          set -euo pipefail
          ENV_TARGET="${{ inputs.env }}"
          SLUG="${{ inputs.image_name }}"

          if [ ! -f "vr-devops/infra/env/${ENV_TARGET}.env" ]; then
            echo "::error::Env file vr-devops/infra/env/${ENV_TARGET}.env not found"
            exit 1
          fi

          # Source env file: export ENV, PROJECT_ID, PROJECT_NUMBER,
          # SVC_SUFFIX, MS_IMAGE_SUFFIX, IMAGE_BASE, AR_REPO, etc.
          # shellcheck disable=SC1090
          source "vr-devops/infra/env/${ENV_TARGET}.env"

          GIT_SHA=$(git rev-parse --short=7 HEAD)

          # Naming homologo a build-image.sh:
          #   beta: ms-sales (MS_IMAGE_SUFFIX="")
          #   prod: ms-sales-api (MS_IMAGE_SUFFIX="-api")
          IMAGE_REPO="ms-${SLUG}${MS_IMAGE_SUFFIX}"
          IMAGE_TAG="${IMAGE_BASE}/${IMAGE_REPO}:sha-${GIT_SHA}"

          # Service real con sufijo (ms-sales-api-beta).
          # SVC_SUFFIX viene del env file (-beta o -prod).
          FULL_SVC="${{ inputs.service_name }}${SVC_SUFFIX}"

          # Job name canonico per S05 conventions.
          JOB_NAME="ms-${SLUG}-migrate${SVC_SUFFIX}"

          # WIF SA email per env (S08 setup).
          if [ "$ENV_TARGET" = "prod" ]; then
            SA_EMAIL="gh-actions-prod@vr-portal-fb.iam.gserviceaccount.com"
            POOL_PROJ_NUM="126856503055"
          elif [ "$ENV_TARGET" = "beta" ]; then
            SA_EMAIL="gh-actions-beta@vr-portal-fb-beta.iam.gserviceaccount.com"
            POOL_PROJ_NUM="214382208885"
          else
            echo "::error::Unsupported env: $ENV_TARGET (only beta|prod)"
            exit 1
          fi

          {
            echo "project_id=$PROJECT_ID"
            echo "project_number=$PROJECT_NUMBER"
            echo "pool_project_number=$POOL_PROJ_NUM"
            echo "service_account=$SA_EMAIL"
            echo "git_sha=$GIT_SHA"
            echo "image_repo=$IMAGE_REPO"
            echo "image_tag=$IMAGE_TAG"
            echo "image_base=$IMAGE_BASE"
            echo "full_svc=$FULL_SVC"
            echo "job_name=$JOB_NAME"
            echo "svc_suffix=$SVC_SUFFIX"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved deploy config:"
          echo "  env=$ENV_TARGET"
          echo "  project=$PROJECT_ID ($PROJECT_NUMBER)"
          echo "  service=$FULL_SVC"
          echo "  image=$IMAGE_TAG"
          echo "  job=$JOB_NAME"
          echo "  sa=$SA_EMAIL"
          echo "  git_sha=$GIT_SHA"

      # Step 4: WIF auth -> impersonate gh-actions-${env}.
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: projects/${{ steps.cfg.outputs.pool_project_number }}/locations/global/workloadIdentityPools/github-pool/providers/github-actions
          service_account: ${{ steps.cfg.outputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ steps.cfg.outputs.project_id }}

      # Step 5: Configure Docker para push a Artifact Registry. Esto
      # configura ~/.docker/config.json con gcloud como credential
      # helper, lo cual buildx usa transparentemente via daemon.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Build + Render (sin mutar Cloud Run todavia) ─────────────────

      # Step 6: Verifica si la imagen ya esta en AR (idempotencia para
      # re-run del mismo commit). Si existe, skip rebuild en step 8.
      - name: Check image existence in AR
        id: image_check
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.cfg.outputs.image_tag }}"
          if gcloud artifacts docker images describe "$IMAGE_TAG" \
              --project="${{ steps.cfg.outputs.project_id }}" \
              --quiet >/dev/null 2>&1; then
            echo "::notice::Image $IMAGE_TAG already in AR, skip rebuild"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Image $IMAGE_TAG NOT in AR, will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Step 7: Setup Docker Buildx con GHA layer cache. Acelera builds
      # consecutivos cacheando capas Docker en el cache de GitHub Actions.
      # Solo se ejecuta si el step 6 indica que hay que rebuildear.
      - name: Set up Docker Buildx
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Step 8: Build + push con buildx. cache-from/cache-to type=gha
      # con scope per (image_name, env) para evitar contaminacion entre
      # repos. mode=max guarda capas intermedias (mas espacio cache, mas
      # velocidad en runs siguientes).
      - name: Build and push Docker image (with GHA cache)
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.cfg.outputs.image_tag }}
          cache-from: type=gha,scope=${{ inputs.image_name }}-${{ inputs.env }}
          cache-to: type=gha,scope=${{ inputs.image_name }}-${{ inputs.env }},mode=max

      # Step 9: Escribe el image marker que render-cloudrun.sh lee.
      # Siempre corre, independiente de si rebuildemos o reusamos AR.
      - name: Write image marker for render
        run: |
          set -euo pipefail
          mkdir -p /tmp
          echo "${{ steps.cfg.outputs.image_tag }}" > "/tmp/last-image-${{ inputs.image_name }}-${{ inputs.env }}.txt"

      # Step 10: Render Service YAML (subgraph.template.yaml).
      - name: Render Cloud Run Service YAML
        id: render-service
        run: |
          set -euo pipefail
          cd vr-devops
          bash scripts/render-cloudrun.sh "${{ inputs.env }}" "${{ inputs.image_name }}"
          OUT="/tmp/cloudrun-${{ inputs.image_name }}-${{ inputs.env }}.yaml"
          echo "::group::Rendered Service YAML"
          cat "$OUT"
          echo "::endgroup::"

      # Step 11: Render Job YAML (job.template.yaml). Skip si mode=never.
      - name: Render Cloud Run Job YAML (migrate)
        id: render-job
        if: inputs.migrate_mode != 'never'
        run: |
          set -euo pipefail
          cd vr-devops
          bash scripts/render-cloudrun.sh "${{ inputs.env }}" "${{ inputs.image_name }}" --job
          OUT="/tmp/cloudjob-${{ inputs.image_name }}-${{ inputs.env }}.yaml"
          echo "::group::Rendered Job YAML"
          cat "$OUT"
          echo "::endgroup::"

      # ── Apply: migrate first, then service, then validate ──────────

      # Step 12: Migrate job replace + execute (BEFORE service deploy).
      # Razon: si migrate falla, el service queda en su revision actual
      # con el schema que esperaba; no entra codigo nuevo a un schema
      # potencialmente roto. Las migrations alembic son forward-only
      # additive (per S03 conventions), por lo que ejecutarlas antes
      # del deploy garantiza que la nueva revision tenga schema listo.
      - name: Migrate job replace + execute (mode=${{ inputs.migrate_mode }})
        id: migrate
        timeout-minutes: ${{ inputs.migrate_timeout_minutes }}
        run: |
          set -euo pipefail
          JOB="${{ steps.cfg.outputs.job_name }}"
          PROJECT="${{ steps.cfg.outputs.project_id }}"
          MODE="${{ inputs.migrate_mode }}"
          YAML="/tmp/cloudjob-${{ inputs.image_name }}-${{ inputs.env }}.yaml"

          EXISTS=false
          if gcloud run jobs describe "$JOB" \
              --region=us-central1 --project="$PROJECT" &>/dev/null; then
            EXISTS=true
          fi

          run_migrate() {
            if [ ! -f "$YAML" ]; then
              echo "::error::Migrate YAML missing at $YAML (render-job step skipped?)"
              exit 1
            fi
            echo "::notice::Updating job $JOB image via render YAML"
            gcloud run jobs replace "$YAML" \
              --region=us-central1 --project="$PROJECT" --quiet
            echo "::notice::Executing migrate job $JOB (sync wait)"
            gcloud run jobs execute "$JOB" \
              --region=us-central1 --project="$PROJECT" --wait
          }

          case "$MODE" in
            auto)
              if $EXISTS; then
                echo "::notice::Migrate job $JOB exists, mode=auto -> running"
                run_migrate
              else
                echo "::notice::Migrate job $JOB does not exist, mode=auto -> skip"
              fi
              ;;
            always)
              if ! $EXISTS; then
                echo "::error::Migrate job $JOB declared required (mode=always) but does not exist in $PROJECT"
                exit 1
              fi
              echo "::notice::Migrate job $JOB executing (mode=always)"
              run_migrate
              ;;
            never)
              echo "::notice::Migrate explicitly disabled (mode=never)"
              ;;
            *)
              echo "::error::Invalid migrate_mode: $MODE (expected auto|always|never)"
              exit 1
              ;;
          esac

      # Step 13: Capture revision previa para rollback. Se hace JUSTO
      # antes del deploy del service para que el snapshot represente lo
      # que hay realmente corriendo en runtime al momento de la mutacion.
      - name: Capture previous service revision (for rollback)
        id: prev_rev
        run: |
          set -euo pipefail
          PREV=$(gcloud run services describe \
            "${{ steps.cfg.outputs.full_svc }}" \
            --region=us-central1 \
            --project="${{ steps.cfg.outputs.project_id }}" \
            --format='value(status.latestReadyRevisionName)' \
            2>/dev/null || echo "")
          echo "rev=$PREV" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV" ]; then
            echo "::notice::No previous revision (first deploy or service missing); rollback unavailable"
          else
            echo "::notice::Previous ready revision captured for rollback: $PREV"
          fi

      # Step 14: Deploy Cloud Run service. Cloud Run mantiene revisiones
      # previas en historial (no las borra) - habilitando rollback.
      - name: Deploy Cloud Run service
        id: deploy
        run: |
          set -euo pipefail
          gcloud run services replace \
            "/tmp/cloudrun-${{ inputs.image_name }}-${{ inputs.env }}.yaml" \
            --region=us-central1 \
            --project="${{ steps.cfg.outputs.project_id }}"

      # Step 15: Smoke universal via gcloud revision health check.
      #
      # Razon: subgrafos ms-* corren con ingress=internal. El GitHub
      # Actions runner es externo a GCP VPC y recibe 404 de GFE en
      # cualquier curl HTTP a ingress=internal. Por tanto curl /health
      # NO es una validacion fiable (falsos negativos).
      #
      # En su lugar verificamos:
      #   1. Revision marcada como Ready=True (deploy completo)
      #   2. ContainerHealthy=True (startup probe OK)
      #   3. Active=True (recibiendo traffic)
      #
      # Adicionalmente, si el service tiene ingress=all (tickets,
      # auth-validator), hacemos HTTP curl complementario (best-effort).
      # Para ingress=internal el HTTP curl se salta con notice.
      - name: Smoke deploy health
        id: smoke
        run: |
          set -euo pipefail
          PROJECT="${{ steps.cfg.outputs.project_id }}"
          SVC="${{ steps.cfg.outputs.full_svc }}"
          MAX_TRIES=$(( ${{ inputs.smoke_timeout_seconds }} / 5 ))
          if [ "$MAX_TRIES" -lt 1 ]; then MAX_TRIES=1; fi

          # 1. gcloud revision health (universal, funciona para cualquier ingress)
          echo "::notice::Validating latest revision health via gcloud (max $MAX_TRIES x 5s)"
          for i in $(seq 1 "$MAX_TRIES"); do
            REV=$(gcloud run services describe "$SVC" \
              --region=us-central1 --project="$PROJECT" \
              --format='value(status.latestReadyRevisionName)')

            if [ -z "$REV" ]; then
              echo "Attempt $i/$MAX_TRIES: latestReadyRevisionName empty, retry in 5s..."
              sleep 5
              continue
            fi

            # Check revision conditions: Ready + ContainerHealthy + Active
            STATUS=$(gcloud run revisions describe "$REV" \
              --region=us-central1 --project="$PROJECT" \
              --format='value(status.conditions)')

            ALL_OK=true
            for cond in "type=Ready,status=True" "type=ContainerHealthy,status=True" "type=Active,status=True"; do
              if ! echo "$STATUS" | grep -q "$cond"; then
                ALL_OK=false
                break
              fi
            done

            if $ALL_OK; then
              echo "::notice::Revision $REV health OK (Ready+ContainerHealthy+Active) on attempt $i/$MAX_TRIES"
              break
            fi

            if [ "$i" = "$MAX_TRIES" ]; then
              echo "::error::Revision $REV not healthy after $MAX_TRIES attempts"
              echo "::group::Final revision status"
              echo "$STATUS"
              echo "::endgroup::"
              exit 1
            fi

            echo "Attempt $i/$MAX_TRIES: revision $REV pending health, retry in 5s..."
            sleep 5
          done

          # 2. HTTP /health curl SOLO si ingress=all (best-effort).
          INGRESS=$(gcloud run services describe "$SVC" \
            --region=us-central1 --project="$PROJECT" \
            --format='value(metadata.annotations[run.googleapis.com/ingress])')

          if [ "$INGRESS" = "all" ]; then
            URL=$(gcloud run services describe "$SVC" \
              --region=us-central1 --project="$PROJECT" \
              --format='value(status.url)')
            TARGET="$URL/health"
            echo "::notice::Service ingress=all - additional HTTP smoke at $TARGET"
            HTTP_OK=false
            for i in $(seq 1 "$MAX_TRIES"); do
              if curl -fsSL --max-time 5 -o /dev/null "$TARGET"; then
                echo "::notice::HTTP smoke OK on attempt $i/$MAX_TRIES"
                HTTP_OK=true
                break
              fi
              echo "HTTP attempt $i/$MAX_TRIES failed, retry in 5s..."
              sleep 5
            done
            if ! $HTTP_OK; then
              echo "::error::HTTP /health failed despite ingress=all and revision healthy"
              exit 1
            fi
          else
            echo "::notice::Service ingress=$INGRESS - skipping external HTTP smoke (not reachable from runner)"
          fi

      # Step 16: Rollback service si deploy succeeded pero smoke fallo.
      # NO se rolla DB: las migrations son forward-only por convencion
      # y la revision previa del service es backward-compat con schema
      # nuevo (additive migrations). La revision rota queda en historial
      # pero NO recibe trafico - investigar antes de re-deploy.
      - name: Rollback to previous revision (smoke failed)
        if: failure() && steps.deploy.conclusion == 'success' && steps.smoke.conclusion == 'failure' && steps.prev_rev.outputs.rev != ''
        run: |
          set -euo pipefail
          PREV="${{ steps.prev_rev.outputs.rev }}"
          echo "::warning::Smoke failed post-deploy. Rolling back traffic 100% to $PREV"
          gcloud run services update-traffic \
            "${{ steps.cfg.outputs.full_svc }}" \
            --to-revisions="$PREV=100" \
            --region=us-central1 \
            --project="${{ steps.cfg.outputs.project_id }}"
          echo "::warning::Rollback complete. Investigate failed revision before retry."

      # Step 17: Audit summary visible en GitHub Actions UI.
      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Service | ${{ steps.cfg.outputs.full_svc }} |"
            echo "| Image | ${{ steps.cfg.outputs.image_tag }} |"
            echo "| Image rebuilt | ${{ steps.image_check.outputs.exists == 'false' }} |"
            echo "| Env | ${{ inputs.env }} |"
            echo "| Project | ${{ steps.cfg.outputs.project_id }} |"
            echo "| Git SHA | ${{ steps.cfg.outputs.git_sha }} |"
            echo "| Migrate mode | ${{ inputs.migrate_mode }} |"
            echo "| Migrate result | ${{ steps.migrate.conclusion || 'not-run' }} |"
            echo "| Smoke timeout | ${{ inputs.smoke_timeout_seconds }}s |"
            echo "| Previous rev | ${{ steps.prev_rev.outputs.rev || 'none (first deploy)' }} |"
            echo "| Deploy result | ${{ steps.deploy.conclusion || 'not-run' }} |"
            echo "| Smoke result | ${{ steps.smoke.conclusion || 'not-run' }} |"
            echo "| Job conclusion | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
