name: Security Scan (Reusable)

# Reusable workflow para SAST + dependency scan en GitHub Free plan.
# Reemplaza CodeQL (que requiere GitHub Advanced Security en Enterprise)
# con stack OSS equivalente en cobertura para Python + JavaScript:
#
#   - Semgrep OSS: 2000+ reglas community, OWASP Top 10, lenguaje-agnostic
#   - Bandit: Python-specific security linter (eval, hardcoded creds,
#             weak crypto, unsafe deserialize, SQL injection patterns)
#   - Trivy: filesystem + dependency CVE scanner (cubre requirements.txt,
#            package-lock.json, Dockerfile)
#   - npm audit: JavaScript dependency vulnerability check
#
# Trigger expected en caller (push + PR + weekly cron):
#   on:
#     push:        { branches: [main] }
#     pull_request: { branches: [main] }
#     schedule:    { - cron: '0 2 * * 1' }   # Lunes 2am UTC
#
# Severity threshold por default: HIGH+. Critical+High break el run,
# Medium+ son warnings (visibles pero no bloquean PR).
#
# Caller espera:
#   uses: Viverent/vr-devops/.github/workflows/security-scan.yml@main
#   with:
#     language: python                       # python | javascript
#     working_directory: .                    # frontends pueden usar "frontend"

on:
  workflow_call:
    inputs:
      language:
        description: "Lenguaje principal (python | javascript). Define que scanners corren."
        required: true
        type: string
      working_directory:
        description: "Subdirectorio para deps scan (frontends). Default '.'."
        required: false
        type: string
        default: "."
      semgrep_config:
        description: "Comma-separated configs Semgrep. Default cubre OWASP + lenguaje."
        required: false
        type: string
        default: "p/security-audit p/owasp-top-ten"
      severity_break:
        description: "Severity minimo para break el run (HIGH | CRITICAL). Default CRITICAL durante onboarding inicial; subir a HIGH cuando codebase quede limpia de findings legacy."
        required: false
        type: string
        default: "CRITICAL"
      run_semgrep:
        description: "Habilita Semgrep step."
        required: false
        type: boolean
        default: true
      run_bandit:
        description: "Habilita Bandit step (solo aplica si language=python)."
        required: false
        type: boolean
        default: true
      run_trivy:
        description: "Habilita Trivy filesystem scan."
        required: false
        type: boolean
        default: true
      run_npm_audit:
        description: "Habilita npm audit step (solo aplica si language=javascript)."
        required: false
        type: boolean
        default: true

# Concurrency cancel-in-progress: pushes nuevos al mismo PR cancelan
# scans viejos para ahorrar minutos CI.
concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # security-events: write necesario solo si subiéramos SARIF a Security
  # tab (requiere GHAS para repos privados). En Free, los hallazgos
  # quedan visibles en logs del run + step summary.

jobs:
  semgrep:
    name: Semgrep SAST
    if: inputs.run_semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      # Instalacion directa de semgrep CLI via pip. La action wrapper
      # `returntocorp/semgrep-action` esta deprecada (su README oficial
      # recomienda migrar a CLI nativo). pip install es el path actual
      # documentado por Semgrep, Inc.
      - name: Install Semgrep
        run: pip install --upgrade semgrep

      # `semgrep scan` corre todas las reglas de los configs listados.
      # `--error` retorna exit code 1 si hay findings (default 0 sin error).
      # Para CONFIGS con espacios separados, expandimos en multiples
      # --config flags (semgrep's --config no acepta lista space-separated
      # en un solo flag).
      - name: Run Semgrep
        run: |
          set -euo pipefail
          CONFIG_ARGS=""
          # shellcheck disable=SC2086
          for cfg in ${{ inputs.semgrep_config }}; do
            CONFIG_ARGS="$CONFIG_ARGS --config=$cfg"
          done
          # shellcheck disable=SC2086
          semgrep scan $CONFIG_ARGS --error

  bandit:
    name: Bandit (Python)
    if: inputs.run_bandit && inputs.language == 'python'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install --upgrade bandit

      # Bandit severity flags (cumulative threshold para EXIT CODE):
      #   -l   shows LOW+   (LOW,MEDIUM,HIGH) -> exit 1 si encuentra cualquiera
      #   -ll  shows MEDIUM+ (MEDIUM,HIGH)    -> exit 1 si MEDIUM o HIGH
      #   -lll shows HIGH only                -> exit 1 solo si HIGH
      # Confidence flags (filtro para REDUCIR false positives):
      #   -ii  filtra a MEDIUM+ confidence (descarta hallazgos LOW-confidence)
      #
      # Bandit no tiene severity CRITICAL (max es HIGH). Tanto severity_break
      # HIGH como CRITICAL mapean al mismo umbral practico: -lll.
      #
      # Source dir auto-detection: ms-* repos usan app/, portal-inversionistas-api
      # usa gateway/. Detectamos en orden: app/ > gateway/ > src/ > working_directory.
      - name: Run Bandit
        run: |
          set -euo pipefail
          case "${{ inputs.severity_break }}" in
            HIGH|CRITICAL) BANDIT_LEVEL="-lll" ;;
            *)
              echo "::error::severity_break invalido para Bandit: ${{ inputs.severity_break }} (solo HIGH|CRITICAL)"
              exit 1
              ;;
          esac

          # Auto-detect Python source dir.
          BANDIT_TARGET=""
          for d in app gateway src; do
            if [ -d "$d" ]; then
              BANDIT_TARGET="$d"
              break
            fi
          done

          if [ -z "$BANDIT_TARGET" ]; then
            echo "::warning::No standard Python source dir found (app/, gateway/, src/) - skip Bandit"
            exit 0
          fi

          echo "::notice::Bandit target dir: $BANDIT_TARGET"
          bandit -r "$BANDIT_TARGET" $BANDIT_LEVEL -ii

  trivy:
    name: Trivy filesystem scan
    if: inputs.run_trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.working_directory }}
          # Trivy severity levels: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          severity: ${{ inputs.severity_break }},CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  npm-audit:
    name: npm audit (JavaScript)
    if: inputs.run_npm_audit && inputs.language == 'javascript'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      # npm audit retorna exit 1 si hay vulnerabilidades >= --audit-level.
      # Valid values per npm docs: low|moderate|high|critical (NOT MEDIUM).
      # severity_break HIGH -> high. CRITICAL -> critical.
      - name: Run npm audit
        run: |
          set -euo pipefail
          case "${{ inputs.severity_break }}" in
            HIGH) LEVEL="high" ;;
            CRITICAL) LEVEL="critical" ;;
            *)
              echo "::error::severity_break invalido para npm audit: ${{ inputs.severity_break }} (solo HIGH|CRITICAL)"
              exit 1
              ;;
          esac
          npm audit --audit-level=$LEVEL

  summary:
    name: Security summary
    runs-on: ubuntu-latest
    needs: [semgrep, bandit, trivy, npm-audit]
    if: always()
    steps:
      - name: Aggregate summary
        run: |
          {
            echo "## Security Scan summary"
            echo ""
            echo "| Scanner | Status |"
            echo "|---------|--------|"
            echo "| Semgrep (SAST) | ${{ needs.semgrep.result }} |"
            echo "| Bandit (Python) | ${{ needs.bandit.result }} |"
            echo "| Trivy (filesystem) | ${{ needs.trivy.result }} |"
            echo "| npm audit (JS) | ${{ needs.npm-audit.result }} |"
            echo ""
            echo "Severity break threshold: \`${{ inputs.severity_break }}\`"
            echo "Working directory: \`${{ inputs.working_directory }}\`"
            echo ""
            echo "Note: GitHub Free plan no tiene Security tab para repos privados."
            echo "Los hallazgos detallados aparecen en los logs de cada job arriba."
          } >> "$GITHUB_STEP_SUMMARY"
