name: CI Backend (Reusable)

# Reusable workflow para validacion de PR (sin deploy). Corre lint
# (ruff), format check, alembic migrations + pytest contra Postgres
# ephemeral. Usado como required status check via branch protection.
#
# Soporta extensiones Postgres (uuid-ossp, citext, etc.) y aplica
# migrations alembic antes de tests para que el schema en CI sea
# representativo del runtime real.
#
# Caller espera (.github/workflows/ci.yml):
#   uses: Viverent/vr-devops/.github/workflows/ci-backend.yml@main
#   with:
#     pg_extensions: "uuid-ossp,citext"
#     apply_migrations: true
#
# Asume estructura repo (FastAPI standard):
#   .
#   |-- app/
#   |-- tests/
#   |-- requirements.txt
#   |-- requirements-dev.txt
#   |-- alembic.ini             (opcional; requerido si apply_migrations=true)
#   |-- db_migrations/          (opcional; alembic migrations)
#   |-- pyproject.toml          (opcional, para ruff config)

on:
  workflow_call:
    inputs:
      python_version:
        description: "Version Python para el runner."
        required: false
        type: string
        default: "3.12"
      run_tests:
        description: "Si false, salta pytest. Util en repos sin tests todavia."
        required: false
        type: boolean
        default: true
      postgres_version:
        description: "Tag Postgres para service container (alpine flavor)."
        required: false
        type: string
        default: "15-alpine"
      database_url:
        description: "DATABASE_URL para tests. Default usa el postgres service container."
        required: false
        type: string
        default: "postgresql+asyncpg://test:test@localhost:5432/test_db"
      pg_extensions:
        description: "Comma-separated list de extensions Postgres a CREATE EXTENSION antes de tests. Ej: 'uuid-ossp,citext'."
        required: false
        type: string
        default: ""
      apply_migrations:
        description: "Si true, corre 'alembic upgrade head' antes de pytest. Requiere alembic.ini en repo root."
        required: false
        type: boolean
        default: false
      extra_env:
        description: "JSON dict con env vars extra para tests. Ej: '{\"REDIS_URL\":\"redis://...\"}'"
        required: false
        type: string
        default: "{}"

# Concurrency: pushes nuevos al mismo PR cancelan runs viejos para
# ahorrar minutos de CI. Diferente del deploy (que NO cancela).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Postgres ephemeral para tests. Health check garantiza que el
    # container esta ready antes de que los siguientes steps arranquen.
    services:
      postgres:
        image: postgres:${{ inputs.postgres_version }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 5432:5432

    env:
      # PGPASSWORD permite que psql conecte sin prompt interactivo.
      PGPASSWORD: test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      # Ruff lint - falla si hay violations no fixeables.
      # Si requirements-dev no instala ruff, warning + skip (no fail
      # para no bloquear repos pre-ruff durante onboarding).
      - name: Ruff lint
        run: |
          if command -v ruff &>/dev/null; then
            ruff check .
          else
            echo "::warning::ruff no instalado en requirements-dev, skip lint"
          fi

      - name: Ruff format check
        run: |
          if command -v ruff &>/dev/null; then
            ruff format --check .
          else
            echo "::warning::ruff no instalado, skip format check"
          fi

      # Crea extensiones Postgres antes de aplicar migrations o correr
      # tests. Necesario para repos cuyas tablas usan tipos como
      # `uuid_generate_v4()` o `citext` que requieren extensions
      # explicitas. Cada extension va en su propio CREATE EXTENSION
      # IF NOT EXISTS para idempotencia.
      - name: Install postgres-client + create extensions
        if: inputs.pg_extensions != ''
        run: |
          set -euo pipefail
          # postgres-client ya viene en ubuntu-latest pero validamos.
          if ! command -v psql &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y postgresql-client
          fi

          IFS=',' read -ra EXTS <<< "${{ inputs.pg_extensions }}"
          for ext in "${EXTS[@]}"; do
            ext_trim=$(echo "$ext" | xargs)
            [ -z "$ext_trim" ] && continue
            echo "::notice::Creating extension: $ext_trim"
            psql -h localhost -U test -d test_db \
              -c "CREATE EXTENSION IF NOT EXISTS \"$ext_trim\";"
          done

      # Aplica alembic migrations contra el postgres ephemeral. Esto
      # garantiza que los tests corran contra un schema identico al
      # de runtime (en lugar de Base.metadata.create_all() que puede
      # divergir si las migrations tienen drift). Idempotent: alembic
      # comparara version table y solo aplicara migrations pendientes.
      - name: Apply alembic migrations
        if: inputs.apply_migrations
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          # Algunos repos leen ALEMBIC_DATABASE_URL en alembic.ini.
          ALEMBIC_DATABASE_URL: ${{ inputs.database_url }}
        run: |
          set -euo pipefail
          if [ ! -f alembic.ini ]; then
            echo "::error::apply_migrations=true pero alembic.ini no existe en repo root"
            exit 1
          fi
          echo "::notice::Running alembic upgrade head against test_db"
          alembic upgrade head

      # Pytest con DATABASE_URL apuntando al postgres service container.
      # Si el repo no tiene tests/, warning + skip.
      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          set -euo pipefail
          if [ ! -d tests ]; then
            echo "::warning::tests/ no existe en repo, skip pytest"
            exit 0
          fi
          pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ${{ inputs.database_url }}
          TESTING: "true"
          # Caller puede inyectar env vars adicionales serializados como
          # JSON en `extra_env`. El siguiente bloque los expande.
          # Patron evita que tengamos N inputs por cada env var.
          # Limitacion: chars especiales JSON pueden requerir escape.
          REDIS_URL: ${{ fromJSON(inputs.extra_env).REDIS_URL || '' }}
          INTERNAL_HMAC_SECRET: ${{ fromJSON(inputs.extra_env).INTERNAL_HMAC_SECRET || 'test-hmac-secret' }}
          MS_IDENTITY_URL: ${{ fromJSON(inputs.extra_env).MS_IDENTITY_URL || '' }}
          MS_CONTRACTS_URL: ${{ fromJSON(inputs.extra_env).MS_CONTRACTS_URL || '' }}
          ATTACHMENT_BUCKET: ${{ fromJSON(inputs.extra_env).ATTACHMENT_BUCKET || 'test-bucket' }}
          GCS_DOCUMENTS_BUCKET: ${{ fromJSON(inputs.extra_env).GCS_DOCUMENTS_BUCKET || 'test-bucket' }}
          GCP_PROJECT_ID: ${{ fromJSON(inputs.extra_env).GCP_PROJECT_ID || 'local-dev' }}
          # ENV: "dev" matchea el Literal de config.py (S03 hardening).
          # "test" no es valor permitido; usar "dev" para CI.
          ENV: "dev"

      - name: CI summary
        if: always()
        run: |
          {
            echo "## CI Backend summary"
            echo ""
            echo "| Check | Value |"
            echo "|-------|-------|"
            echo "| Python | ${{ inputs.python_version }} |"
            echo "| Postgres | postgres:${{ inputs.postgres_version }} |"
            echo "| Extensions | ${{ inputs.pg_extensions || '(none)' }} |"
            echo "| Migrations applied | ${{ inputs.apply_migrations }} |"
            echo "| Tests run | ${{ inputs.run_tests }} |"
            echo "| Job conclusion | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
